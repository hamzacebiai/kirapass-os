name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "checkpoint/**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kirapass
          POSTGRES_PASSWORD: kirapass
          POSTGRES_DB: kirapass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kirapass:kirapass@localhost:5432/kirapass_test
      JWT_SECRET: ci-test-secret-min-32-characters-ok
      JWT_ACCESS_EXPIRES_IN: 15m
      NODE_ENV: test
      PORT: 3000
      CORS_ORIGINS: http://localhost:3000
      DIAGNOSTICS_TOKEN: ci-diagnostics-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npm run db:generate

      - name: Prisma Migrate (test DB)
        run: npx prisma migrate deploy
        working-directory: packages/database

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npx jest --ci --reporters=default --reporters=jest-junit
        working-directory: apps/api
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: unit-results.xml

      - name: E2E Tests
        if: hashFiles('apps/api/test/**/*.e2e-spec.ts') != ''
        run: npx jest --config ./test/jest-e2e.json --ci
        working-directory: apps/api

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/api/test-results/
          retention-days: 7

  project-health:
    name: Project Health Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
      - name: Health Summary
        run: |
          echo "## Project Health" >> $GITHUB_STEP_SUMMARY
          echo "| Metric  | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build   | ${{ needs.build-and-test.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests   | ${{ needs.build-and-test.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch  | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit  | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
